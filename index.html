<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gain — Decks</title>
    <style>
      :root {
        --primary-500: #f59e0b;
        --primary-700: #a86405;
        --accent-500: #ff7a00;
        --accent-700: #a84f00;
        --neutral-0: #f6f2ee;
        --neutral-200: #b8b1a9;
        --neutral-500: #5c554e;
        --neutral-700: #211b16;
        --neutral-900: #0f0803;
        --neutral-950: #0b0602;
        --shadow-soft: 0 8px 24px rgba(17, 10, 3, 0.06);
        --shadow-card: 0 24px 48px rgba(17, 10, 3, 0.08);
        --radius-lg: 24px;
        --radius-xl: 32px;
        --font-display: Georgia, "Times New Roman", serif;
        --font-body: "Trebuchet MS", "Gill Sans", "Segoe UI", sans-serif;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: var(--font-body);
        background:
          radial-gradient(
            ellipse 120% 80% at 20% 0%,
            rgba(255, 202, 92, 0.18),
            transparent 50%
          ),
          radial-gradient(
            ellipse 100% 60% at 85% 100%,
            rgba(255, 122, 0, 0.12),
            transparent 45%
          ),
          linear-gradient(180deg, #fdfbf8 0%, #f8f4f0 50%, #f6f2ee 100%);
        color: var(--neutral-900);
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 32px 24px 48px;
      }

      .page-wrapper {
        width: 100%;
        max-width: 480px;
      }

      .card {
        background: rgba(255, 255, 255, 0.72);
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
        border: 1px solid rgba(92, 85, 78, 0.1);
        border-radius: var(--radius-xl);
        padding: 40px 36px 36px;
        box-shadow: var(--shadow-card);
      }

      .home-header {
        text-align: center;
        margin-bottom: 36px;
        padding-bottom: 28px;
        border-bottom: 1px solid rgba(92, 85, 78, 0.1);
      }

      .home-header img {
        height: 40px;
        width: auto;
        object-fit: contain;
        display: block;
        margin: 0 auto;
      }

      .home-title {
        font-family: var(--font-display);
        font-size: clamp(1.75rem, 4vw, 2.25rem);
        margin: 20px 0 0;
        letter-spacing: -0.03em;
        line-height: 1.1;
        color: var(--neutral-900);
      }

      .home-subtitle {
        margin: 10px 0 0;
        font-size: 0.95rem;
        color: var(--neutral-500);
        font-weight: 500;
      }

      .nav {
        display: flex;
        flex-direction: column;
        gap: 14px;
      }

      .nav-button {
        display: flex;
        align-items: center;
        justify-content: space-between;
        width: 100%;
        padding: 18px 22px;
        font: inherit;
        font-size: 1.08rem;
        font-weight: 700;
        color: var(--neutral-950);
        background: linear-gradient(135deg, #ffe7b7 0%, #ffca5c 100%);
        border: 1px solid rgba(11, 6, 2, 0.06);
        border-radius: var(--radius-lg);
        cursor: pointer;
        text-align: left;
        text-decoration: none;
        transition: transform 180ms ease, box-shadow 180ms ease, border-color 180ms ease;
        box-shadow: var(--shadow-soft);
      }

      .nav-button:hover,
      .nav-button:focus-visible {
        transform: translateY(-2px);
        box-shadow: 0 14px 36px rgba(17, 10, 3, 0.1);
        outline: none;
      }

      .nav-button .chevron {
        flex-shrink: 0;
        width: 20px;
        height: 20px;
        margin-left: 8px;
        opacity: 0.7;
        transition: transform 220ms ease;
      }

      .nav-button[aria-expanded="true"] .chevron {
        transform: rotate(180deg);
      }

      .nav-button.secondary {
        background: rgba(255, 255, 255, 0.95);
        border: 1px solid rgba(92, 85, 78, 0.14);
        color: var(--neutral-900);
      }

      .deck-list {
        list-style: none;
        margin: 0;
        padding: 0;
        display: grid;
        grid-template-rows: 0fr;
        transition: grid-template-rows 280ms ease, margin 280ms ease, opacity 200ms ease;
        opacity: 0;
      }

      .deck-list.visible {
        grid-template-rows: 1fr;
        margin-top: 6px;
        margin-bottom: 4px;
        opacity: 1;
      }

      .deck-list-inner {
        overflow: hidden;
      }

      .deck-list ul {
        list-style: none;
        margin: 0;
        padding: 10px 0 4px;
        display: flex;
        flex-direction: column;
        gap: 10px;
      }

      .deck-list li {
        margin: 0;
      }

      .deck-link {
        display: flex;
        align-items: center;
        gap: 14px;
        padding: 16px 20px;
        background: rgba(255, 255, 255, 0.9);
        border: 1px solid rgba(92, 85, 78, 0.1);
        border-radius: 18px;
        color: var(--neutral-900);
        text-decoration: none;
        font-weight: 600;
        font-size: 1rem;
        transition: background 180ms ease, border-color 180ms ease, transform 160ms ease;
      }

      .deck-link:hover,
      .deck-link:focus-visible {
        background: rgba(255, 250, 240, 0.98);
        border-color: rgba(255, 122, 0, 0.35);
        transform: translateX(4px);
        outline: none;
      }

      .deck-link .pin {
        flex-shrink: 0;
        font-size: 0.7rem;
        text-transform: uppercase;
        letter-spacing: 0.12em;
        color: var(--accent-700);
        font-weight: 800;
      }

      .deck-link .label {
        flex-grow: 1;
      }

      .deck-link .arrow {
        flex-shrink: 0;
        color: var(--neutral-200);
        font-size: 0.9rem;
        transition: color 160ms ease, transform 160ms ease;
      }

      .deck-link:hover .arrow {
        color: var(--accent-500);
        transform: translateX(2px);
      }

      .footer {
        margin-top: 32px;
        text-align: center;
        font-size: 0.8rem;
        color: var(--neutral-500);
      }
    </style>
  </head>
  <body>
    <div class="page-wrapper">
      <div class="card">
        <header class="home-header">
          <img src="./logo/main_logo.png" alt="Gain" />
          <h1 class="home-title">Decks</h1>
          <p class="home-subtitle">Partner & client presentations</p>
        </header>

        <nav class="nav">
          <button
            type="button"
            class="nav-button"
            id="partner-decks-toggle"
            aria-expanded="false"
            aria-controls="partner-deck-list"
          >
            <span>Partner decks</span>
            <svg class="chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <polyline points="6 9 12 15 18 9"></polyline>
            </svg>
          </button>
          <div class="deck-list" id="partner-deck-list" aria-label="Available partner decks">
            <div class="deck-list-inner">
              <ul role="list">
                <li>
                  <a href="decks/partner/en.html" class="deck-link">
                    <span class="pin">EN</span>
                    <span class="label">Partner deck</span>
                    <span class="arrow" aria-hidden="true">→</span>
                  </a>
                </li>
                <li>
                  <a href="decks/partner/es.html" class="deck-link">
                    <span class="pin">ES</span>
                    <span class="label">Partner deck (Spanish)</span>
                    <span class="arrow" aria-hidden="true">→</span>
                  </a>
                </li>
                <li>
                  <a href="decks/partner/fisherman.html" class="deck-link">
                    <span class="label">Gain × Fisherman</span>
                    <span class="arrow" aria-hidden="true">→</span>
                  </a>
                </li>
              </ul>
            </div>
          </div>

          <button
            type="button"
            class="nav-button secondary"
            id="client-decks-toggle"
            aria-expanded="false"
            aria-controls="client-deck-list"
          >
            <span>Client decks</span>
            <svg class="chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <polyline points="6 9 12 15 18 9"></polyline>
            </svg>
          </button>
          <div class="deck-list" id="client-deck-list" aria-label="Available client decks">
            <div class="deck-list-inner">
              <ul role="list">
                <li>
                  <a href="decks/client/en.html" class="deck-link">
                    <span class="pin">EN</span>
                    <span class="label">Client deck</span>
                    <span class="arrow" aria-hidden="true">→</span>
                  </a>
                </li>
                <li>
                  <a href="decks/client/es.html" class="deck-link">
                    <span class="pin">ES</span>
                    <span class="label">Client deck (Spanish)</span>
                    <span class="arrow" aria-hidden="true">→</span>
                  </a>
                </li>
              </ul>
            </div>
          </div>
        </nav>
      </div>

      <p class="footer">Gain Inc.</p>
    </div>

    <script>
      const toggle = document.getElementById("partner-decks-toggle");
      const list = document.getElementById("partner-deck-list");

      toggle.addEventListener("click", () => {
        const expanded = list.classList.toggle("visible");
        toggle.setAttribute("aria-expanded", String(expanded));
      });

      const clientToggle = document.getElementById("client-decks-toggle");
      const clientList = document.getElementById("client-deck-list");

      clientToggle.addEventListener("click", () => {
        const expanded = clientList.classList.toggle("visible");
        clientToggle.setAttribute("aria-expanded", String(expanded));
      });
    </script>
  </body>
</html>
